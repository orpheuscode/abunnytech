[project]
name = "hackathon-pipelines"
version = "0.1.0"
description = "Hackathon integration: reel discovery, Veo generation, social posting, product discovery, Gemini orchestration"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7.0",
    "browser-runtime",
    "google-genai>=1.0.0",
    "twelvelabs>=1.0.0",
    "browser-cookie3>=0.20.1",
    "httpx>=0.28.0",
    "instaloader>=4.15.1",
    "imageio>=2.37.0",
    "imageio-ffmpeg>=0.6.0",
    "numpy>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hackathon_pipelines"]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
