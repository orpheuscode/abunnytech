target-version = "py312"
line-length = 100
src = ["packages", "apps", "agents"]

[lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[lint.isort]
known-first-party = [
    "abunny_stage0_identity",
    "pipeline_core",
    "pipeline_contracts",
    "pipeline_stage0_identity",
    "pipeline_stage1_discover",
    "pipeline_stage2_generate",
]
