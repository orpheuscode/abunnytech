target-version = "py312"
line-length = 100
src = [
    "packages",
    "apps",
    "agents",
    "stages",
    "services",
    "state_api",
    "orchestrator",
    "runtime_dashboard",
    "integration",
    "scripts",
    "tests",
]

[lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[lint.isort]
known-first-party = [
    "abunny_stage0_identity",
    "apps",
    "state_api",
    "orchestrator",
    "runtime_dashboard",
    "packages",
    "pipeline_core",
    "pipeline_contracts",
    "pipeline_stage0_identity",
    "pipeline_stage1_discover",
    "pipeline_stage2_generate",
    "stages",
    "services",
]
