[project]
name = "pipeline-stage2-generate"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "abunny-stage2-generation",
    "media-pipeline",
    "pipeline-core",
    "pipeline-contracts",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pipeline_stage2_generate"]
