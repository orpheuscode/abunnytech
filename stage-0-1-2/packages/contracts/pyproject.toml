[project]
name = "pipeline-contracts"
version = "0.1.0"
description = "Canonical pipeline handoff contracts"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pipeline_contracts"]
